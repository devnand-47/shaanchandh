kind = "web"
previewPath = "/"
title = "CineConnect"
version = "1.0.0"
id = "artifacts/cineconnect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21627

[services.development]
run = "pnpm --filter @workspace/cineconnect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cineconnect", "run", "build" ]
publicDir = "artifacts/cineconnect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21627"
BASE_PATH = "/"
